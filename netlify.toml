# Netlify configuration for the ReThinkWelly static site.
# No build step: the site is plain files, published from the repo root.

[build]
  publish = "."
  command = ""

# Long-cache the images (they are versioned by filename).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Always revalidate the HTML so edits go live immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sensible security headers. No Content-Security-Policy here on purpose:
# the Behold Instagram widget and Google Fonts load from other origins,
# and a strict CSP would block them.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
